# Application name shown in logs and Spring Boot banner
spring.application.name=bookshelf-manager

# H2 in-memory database (data resets when JVM stops unless you switch to file URL)
spring.datasource.url=jdbc:h2:mem:bookshelf;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA: Hibernate updates schema to match entities; good for learning demos
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Run data.sql after Hibernate creates tables
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# H2 web console: http://localhost:8080/h2-console  (JDBC URL: jdbc:h2:mem:bookshelf)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JSON dates as ISO-8601 strings
spring.jackson.serialization.write-dates-as-timestamps=false

server.port=8080

# Simulated auth: send header X-API-Key on POST (and other non-GET /api calls)
bookshelf.security.enabled=true
bookshelf.security.api-key=demo-secret
